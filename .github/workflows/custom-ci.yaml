name: Custom / CI

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs at 00:00

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ipc-sim/ipc-toolkit
      - name: Checkout cibuildwheel config
        uses: actions/checkout@v6
        with:
          path: tmp.wbc9ar41ex
          sparse-checkout: pyproject.toml
      - name: Install Ccache
        run: sudo apt-get --yes install ccache
      - id: ccache
        name: Get ccache config
        run: echo "cache_dir=$(ccache --get-config 'cache_dir')" >> "$GITHUB_OUTPUT"
      - name: Ccache
        uses: actions/cache@v5
        with:
          path: ${{ steps.ccache.outputs.cache_dir }}
          key: ccache-${{ runner.os }}-${{ runner.arch }}
      - name: Ccache zero stats
        run: ccache --zero-stats
      - name: cibuildwheel
        uses: pypa/cibuildwheel@v3.4
        with:
          config-file: tmp.wbc9ar41ex/pyproject.toml
        env:
          CCACHE_DIR: /host/${{ steps.ccache.outputs.cache_dir }}
      - name: Ccache stats
        run: ccache --show-stats
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheelhouse
          path: wheelhouse/*.whl

  release:
    name: Release
    permissions:
      contents: write
    needs:
      - build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: wheelhouse
          path: wheelhouse
      - name: Delete old release
        run: gh release delete 'latest' --cleanup-tag --yes --repo '${{ github.repository }}'
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          files: wheelhouse/*.whl
