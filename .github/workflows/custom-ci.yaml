name: Custom / CI

on:
  push:

jobs:
  cibuildwheel:
    name: cibuildwheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Ccache
        run: sudo apt-get --yes install ccache
      - id: ccache
        name: Get ccache config
        run: echo "cache_dir=$(ccache --get-config 'cache_dir')" >> "$GITHUB_OUTPUT"
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ steps.ccache.outputs.cache_dir }}
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-${{ runner.arch }}-
      - name: Ccache zero stats
        run: ccache --zero-stats
      - name: cibuildwheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1
        with:
          package-dir: ipc-toolkit
          config-file: pyproject.toml
        env:
          CCACHE_DIR: /host/${{ steps.ccache.outputs.cache_dir }}
      - name: Ccache stats
        run: ccache --show-stats
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheelhouse
          path: wheelhouse/*.whl

  build-stubs:
    name: Build Stubs
    needs:
      - cibuildwheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Wheels
        uses: actions/download-artifact@v8
        with:
          name: wheelhouse
          path: wheelhouse
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build
        run: uvx --from 'build[uv]' python -m build --installer uv
        working-directory: ipctk-stubs
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ipctk-stubs
          path: |-
            ipctk-stubs/dist/*.tar.gz
            ipctk-stubs/dist/*.whl

  release:
    name: Release
    permissions:
      actions: write
      contents: write
    needs:
      - cibuildwheel
      - build-stubs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: wheelhouse
          path: dist
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ipctk-stubs
          path: dist
      - name: Delete stale release
        run: gh release delete 'latest' --cleanup-tag --yes --repo '${{ github.repository }}'
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          files: dist/*

  index:
    name: Index
    permissions:
      id-token: write
      pages: write
    needs:
      - release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build Index
        run: mise run gen:index
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages
      - id: deploy
        name: Deploy GitHub Pages site
        uses: actions/deploy-pages@v5
